services:
  postgres:
    # IMPORTANTE: usar pgvector/pgvector — postgres oficial não traz a extensão.
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-nesis}
      POSTGRES_USER: ${POSTGRES_USER:-nesis}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-nesis}
    ports:
      - "5432:5432"
    # volumes:
    #   - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-nesis} -d ${POSTGRES_DB:-nesis}" ]
      interval: 5s
      timeout: 5s
      retries: 10

  backend:
    build: .
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER:-nesis}:${POSTGRES_PASSWORD:-nesis}@postgres:5432/${POSTGRES_DB:-nesis}
      APP_ENV: ${APP_ENV:-development}
    ports:
      - "8000:8000"
    # volumes:
    #   - ./:/app
    command: >
      sh -c "alembic upgrade head &&
             uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload"

