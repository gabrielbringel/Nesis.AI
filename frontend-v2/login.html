<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Entrar — NesisAI</title>

  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Space+Mono:ital,wght@0,400;0,700;1,400;1,700&family=Special+Gothic+Expanded+One&family=Syne:wght@400..800&display=swap" rel="stylesheet" />

  <link rel="stylesheet" href="assets/style/tokens.css" />
  <link rel="stylesheet" href="assets/style/components.css" />
  <link rel="stylesheet" href="assets/style/pages.css" />
</head>
<body class="login-page">
  <div class="login-bg" aria-hidden="true"></div>

  <div class="login-center">
    <form id="loginForm" class="login-card" novalidate>
      <div class="login-card-logo">
        <img src="assets/nesisai-wordmark.svg" alt="NesisAI" />
      </div>

      <h1>Bem-vindo de volta</h1>
      <p class="subtitle">Entre com suas credenciais para continuar</p>

      <div class="login-actions">
        <div class="field">
          <label class="field-label" for="loginEmail">E-mail</label>
          <div class="input-wrap">
            <input
              id="loginEmail"
              class="input"
              type="email"
              name="email"
              placeholder="seu@email.com"
              autocomplete="email"
            />
          </div>
        </div>

        <div class="field">
          <label class="field-label" for="loginPassword">Senha</label>
          <div class="input-wrap">
            <input
              id="loginPassword"
              class="input"
              type="password"
              name="password"
              placeholder="••••••••"
              autocomplete="current-password"
            />
            <button
              id="pwToggle"
              type="button"
              class="input-icon-btn"
              aria-label="Mostrar senha"
            >
              <i data-lucide="eye" id="pwIconShow"></i>
              <i data-lucide="eye-off" id="pwIconHide" style="display:none"></i>
            </button>
          </div>
        </div>

        <a href="#" class="login-forgot">Esqueci minha senha</a>

        <button id="loginBtn" type="submit" class="btn btn-primary btn-lg">
          <span id="loginBtnLabel">Entrar</span>
        </button>
      </div>

      <p class="login-hint">Demonstração aberta — qualquer credencial serve.</p>
    </form>
  </div>

  <script src="https://unpkg.com/lucide@latest/dist/umd/lucide.min.js"></script>
  <script src="js/nav.js"></script>
  <script>lucide.createIcons();</script>
</body>
</html>
